<!--
  "Start test version" button for the marketing site (procworks.de, IONOS).

  Self-contained snippet: paste the markup into the landing page and set the
  placeholders below. It POSTs to the separately hosted demo broker, shows a
  short "preparing" state, then redirects the visitor to their own demo URL.

  Configure (on the #pw-trial element):
    * data-broker-url : the broker's /trial endpoint.
        - Live on the custom domain: https://broker.procworks.de/trial
          (A/AAAA at IONOS → procworks-demo-broker, Fly TLS cert verified).
        - The raw app URL https://procworks-demo-broker.fly.dev/trial also works
          as a fallback.
    * data-sitekey    : your Cloudflare Turnstile *site* key (public) — ONLY if
        you run the broker WITH a Captcha (CAPTCHA_SECRET set). The productive
        broker runs Captcha-free (rate limits + active cap), so leave this empty
        or at the placeholder and no Turnstile is loaded; the button works right
        away. Set a real sitekey (and the broker's CAPTCHA_SECRET) to turn the
        Captcha on — the widget then gates the button and its token is sent along.

  The broker enforces all limits (active cap, per-IP, daily, TTL) and — if
  enabled — the Captcha server-side; this page holds no secrets and no
  correctness logic.
-->
<div id="pw-trial"
     data-broker-url="https://broker.procworks.de/trial"
     data-sitekey="">
  <button id="pw-trial-btn" type="button">Testversion starten</button>
  <!-- Turnstile renders here ONLY when a real data-sitekey is configured. -->
  <div id="pw-trial-captcha"></div>
  <p id="pw-trial-status" role="status" aria-live="polite"></p>
</div>

<script>
  (function () {
    var root = document.getElementById("pw-trial");
    var btn = document.getElementById("pw-trial-btn");
    var status = document.getElementById("pw-trial-status");
    var captchaBox = document.getElementById("pw-trial-captcha");

    // A sitekey counts as "configured" only if it is a non-empty, non-placeholder
    // value. Empty/placeholder => Captcha-free mode (matches the productive broker).
    var sitekey = (root.dataset.sitekey || "").trim();
    var captchaOn = sitekey !== "" && sitekey !== "YOUR_TURNSTILE_SITEKEY";
    var token = null;

    function fail(msg) {
      status.textContent = msg;
      btn.disabled = false;
    }

    // Fire the actual provisioning request. `captcha_token` is null when Captcha
    // is off; the broker's _verify_captcha then passes (no CAPTCHA_SECRET).
    function startTrial() {
      btn.disabled = true;
      status.textContent = "Deine Testumgebung wird vorbereitet …";

      fetch(root.dataset.brokerUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ captcha_token: token })
      })
        .then(function (r) {
          if (r.status === 429) throw new Error("Gerade viel los – bitte in ein paar Minuten erneut versuchen.");
          if (!r.ok) throw new Error("Die Testversion konnte nicht gestartet werden. Bitte später erneut versuchen.");
          return r.json();
        })
        .then(function (data) {
          status.textContent = "Bereit! Du wirst weitergeleitet …";
          window.location.href = data.url;
        })
        .catch(function (e) { fail(e.message); });
    }

    if (captchaOn) {
      // Captcha mode: render Turnstile, keep the button disabled until the
      // visitor passes, then carry the token into the request.
      btn.disabled = true;

      var widget = document.createElement("div");
      widget.className = "cf-turnstile";
      widget.setAttribute("data-sitekey", sitekey);
      widget.setAttribute("data-callback", "pwTrialReady");
      captchaBox.appendChild(widget);

      window.pwTrialReady = function (t) {
        token = t;
        btn.disabled = false;
      };

      var s = document.createElement("script");
      s.src = "https://challenges.cloudflare.com/turnstile/v0/api.js";
      s.async = true;
      s.defer = true;
      document.head.appendChild(s);

      btn.addEventListener("click", function () {
        if (!token) { fail("Bitte zuerst die Sicherheitsprüfung abschließen."); return; }
        startTrial();
      });
    } else {
      // Captcha-free mode (productive default): button is live immediately.
      btn.addEventListener("click", startTrial);
    }
  })();
</script>
