# Full local/self-hosted stack for ProcWorks (roadmap step 16):
# PostgreSQL + stateless API + Caddy (reverse proxy / TLS / static web).
#
# Start (from the repository root):
#   docker compose -f deploy/docker-compose.full.yml up --build
# Then open http://localhost (the web container serves the SPA and proxies /api).
#
# For a public HTTPS deployment, set SITE_ADDRESS to your domain and ACME_EMAIL
# to a contact address; Caddy then provisions Let's Encrypt certificates.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: process
      POSTGRES_PASSWORD: process
      POSTGRES_DB: procworks
    volumes:
      - procworks_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U process -d procworks"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../core
    restart: unless-stopped
    environment:
      # Durable schema, instance and audit-event persistence.
      DATABASE_URL: postgresql+psycopg://process:process@postgres:5432/procworks
      # Production default: require username/password login (the open dev mode
      # grants every role without authentication). On first start a default
      # 'admin' account is created and its one-off password is written to the
      # API container log (`docker compose logs api`) -- log in and change it.
      # Pin a known admin instead by setting PROCWORKS_ADMIN_LOGIN +
      # PROCWORKS_ADMIN_PASSWORD.
      PROCWORKS_AUTH: password
      # Read-only backup admin view (GET /admin/backups, POST …/run-now): the API
      # only reads the metadata index the backup scheduler publishes here and
      # writes a .run-now trigger. It has NO access to the dump volume (§9).
      PROCWORKS_BACKUP_CONTROL_DIR: /control
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - procworks_backup_control:/control

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    restart: unless-stopped
    environment:
      # ":80" = plain HTTP for local use. Set to your domain for automatic HTTPS.
      SITE_ADDRESS: ":80"
      API_UPSTREAM: "api:8000"
      # ACME_EMAIL is only needed for HTTPS. Leave it unset for local ":80" HTTP
      # (the Caddyfile supplies a placeholder default); set it for production.
      # ACME_EMAIL: "you@example.com"
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    volumes:
      - caddy_data:/data
      - caddy_config:/config

  # Out-of-the-box datensicherung: a small scheduler that produces one
  # consistent pg_dump per day (concept docs/Backup-und-Restore-Konzept.md).
  # Built from the postgres image (pg_dump/pg_restore already inside) plus gnupg
  # for optional encryption at rest; writes to the dedicated procworks_backups
  # volume. Runs entirely on the operations layer -- the API/core is untouched.
  backup:
    build:
      context: ./backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # libpq connection to the bundled database.
      PGHOST: postgres
      PGUSER: process
      PGPASSWORD: process
      PGDATABASE: procworks
      # Schedule + retention (Grandfather-Father-Son). All overridable.
      BACKUP_CRON: "0 2 * * *"        # daily at 02:00 UTC
      BACKUP_KEEP_DAILY: "14"
      BACKUP_KEEP_WEEKLY: "8"
      BACKUP_KEEP_MONTHLY: "6"
      # Shared control surface for the read-only admin view (metadata only, no
      # dumps): the scheduler publishes backups-index.json here and watches for
      # the API's .run-now trigger.
      BACKUP_CONTROL_DIR: "/control"
      # Optional hardening/extension hooks (see the concept, left empty here):
      #   BACKUP_PASSPHRASE   -> symmetric encryption at rest (needs gpg/age)
      #   BACKUP_SYNC_CMD     -> off-site copy command (rsync/rclone/aws s3 ...)
      #   BACKUP_ALERT_WEBHOOK-> POST backup success/failure to an ops endpoint
    volumes:
      - procworks_backups:/backups
      - procworks_backup_control:/control
      - ./backup:/opt/backup:ro       # mitgelieferte Skripte (relativ zu deploy/)
    entrypoint: ["/bin/sh", "/opt/backup/run-scheduler.sh"]

volumes:
  procworks_pgdata:
  procworks_backups:                  # persistente Ablage der Sicherungen
  procworks_backup_control:           # metadaten-Index + .run-now für die Admin-Sicht
  caddy_data:
  caddy_config:
