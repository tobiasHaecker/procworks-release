apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "procworks.api.fullname" . }}
  labels:
    {{- include "procworks.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "procworks.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "procworks.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: {{ include "procworks.api.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "procworks.database.secretName" . }}
                  key: {{ .Values.database.secretKey }}
            - name: PROCWORKS_AUTH
              value: {{ .Values.api.authMode | quote }}
            {{- if .Values.api.adminSecret }}
            - name: PROCWORKS_ADMIN_LOGIN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.adminSecret }}
                  key: login
            - name: PROCWORKS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.adminSecret }}
                  key: password
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
